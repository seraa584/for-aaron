<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aaron’s Countdown ❤️</title>

<style>
body {
  background: linear-gradient(135deg,#000000,#1a0000);
  font-family:"Segoe UI",Arial,sans-serif;
  color:#f2f2f2;
  text-align:center;
  padding:20px;
}

h1{
  color:#ff1a1a;
}

.subtitle{
  color:#ff6666;
  margin-bottom:30px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(80px,1fr));
  gap:15px;
  max-width:600px;
  margin:auto;
}

.box{
  background:#0d0d0d;
  padding:20px;
  border-radius:15px;
  cursor:pointer;
  box-shadow:0 8px 20px rgba(255,26,26,0.2);
  transition:0.2s;
  min-height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  font-size:16px;
}

.box:hover{
  transform:scale(1.05);
}

.locked{
  opacity:0.6;
  cursor:not-allowed;
}

.message{
  margin-top:30px;
  font-size:18px;
  color:#ffcccc;
  min-height:80px;
  line-height:1.4;
}
</style>
</head>

<body>

<h1>For You ❤️</h1>
<div class="subtitle">Open one each day until your birthday 🎂</div>

<div class="grid" id="calendar"></div>

<div class="message" id="messageBox"></div>

<script>
const messages = [
  "Day 1: Hi my love, I'm so excited for ur bday! I love u so much. Hope u enjoy every day of this month. ❤️",

  "Day 4: Rmb that one stayback day when we were tg? I enjoyed so much. I love love love spending time w u. I loved our first date; like, ur gen so fun to be around, Umma. ❤️",
  "Day 5: Rmb when u first held my hand? I rmb the whole convo that led yo that. I love holding ur hands; so warm and nice, Umma. ❤️",
  "Day 6: Rmb our first indirect kiss? The juice day when I fell lol... From there to actual kisses, wow. I love kissing you. Ur cheek, ur lips, everything. I cld gen kiss you forever, Ummaaa. ❤️",
  "Day 7: Rmb ur gifts, ur boats, juice, candies, brownies, and now rose and book asw. I lub all ur gifts so much. Thank you, dear Umma. ❤️",
  "Day 8: Rmb farewell day hug? That was the best thing ever; the way you held me tight, I loved it so much. I wanna hug you forever, Ummaa. ❤️",
  "Day 9: Rmb the days when we used to text til like 6 in the morning... I wanna spend the rest of my 6ams with you. ❤️",
  "Day 10: I love how ur so gentle and sweet. I feel so safe with you; so cozy, my home ❤❤️",
  "Day 11: 11 more days left!!!!!!!! So exciteds.... Rmb the graduation day where I was extremely happy 4u? I feel the same rn but 10x. Idk y, Ummaa. ❤️",
  "Day 12: Everytime u say 'I love you', it feels like 22nd Jan all over again. I get butterflies everytime lol. Seriously, I love you so much lol. ❤️",
  "Day 13: Can't stop thinking ab our first official date. I loved the way we were stargazing and listening to song w our hands intertwined. I felt so safe with u; like at that moment, I knew fs that I wanted to be with you always. ❤️",
  "Day 14: I love the way you touch me. The way you touched my cheeks, my back, my face, my hands, my shoulders, everything. I love you, Ummaa. ❤️",

  "Day 16: I cant belieeve ur my boyfriend... emphasis on my. I still rmb the Birla confessions page; like, damn, who wldve thought? Thank u for treating me right. I love you so much. U deserve the world. ❤️",
  "Day 17: I love our game dates. I love how I always win lol. I love you lol. Lets marry lol. Lets do this forever lol. ❤️",
  "Day 18: I love how u alw mind read. Like, isnt it lowk so cool how we interlinks, made4eachother lol. ❤️",
  "Day 19: I love how u dont have an ego. I love how genuine and pure u are. Never change, my love. ❤️",
  "Day 20: I love staring at you. Ur the most beautiful man ever; my most beautiful man, Umma love. ❤️",
  "Day 21: I love how u dont judge me and make me feel seen. Ur such an amazing person. Seriously, I hope u alw get the best. ❤️",
  "Day 22: Happy birthday my love (happy 3 months asw, Umma)! May God bless you. I love you so much. Happy 18! I hope all ur wishes and prayers get granted. I love u so so so much, dear. Enjoy ur day, Ummaaaaaaaaaaaaaaaaaa. ❤️"
];

// START DATE
const startDate = new Date("2026-04-01");

const calendar = document.getElementById("calendar");
const messageBox = document.getElementById("messageBox");

messages.forEach((msg, i) => {
  const dayDate = new Date(startDate);
  dayDate.setDate(startDate.getDate() + i);

  const box = document.createElement("div");
  box.className = "box";
  calendar.appendChild(box);

  function updateBox() {
    const now = new Date();
    if (now >= dayDate) {
      box.classList.remove("locked");
      box.innerText = i + 1;
      box.onclick = () => {
        messageBox.innerText = msg;
      };
    } else {
      box.classList.add("locked");

      let diff = dayDate - now;
      const days = Math.floor(diff / (1000*60*60*24));
      diff -= days * (1000*60*60*24);
      const hours = Math.floor(diff / (1000*60*60));
      diff -= hours * (1000*60*60);
      const minutes = Math.floor(diff / (1000*60));

      box.innerText = `🔒 ${days}d ${hours}h ${minutes}m`;
    }
  }

  updateBox(); // initial update
  setInterval(updateBox, 60000); // update every minute
});
</script>

</body>
</html>
