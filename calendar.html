  padding:20px;

h1{

.grid{
  display:grid;

  max-width:600px;
  margin:auto;

.box{
  background:#0d0d0d;
  padding:20px;
  border-radius:15px;
  cursor:pointer;
  box-shadow:0 8px 20px rgba(255,26,26,0.2);
  transition:0.2s;
  min-height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  font-size:16px;
}

.box:hover{
  transform:scale(1.05);
}

.message{
  margin-top:30px;
  font-size:18px;
  color:#ffcccc;
  min-height:80px;
  line-height:1.6;
  white-space:pre-line;
}
</style>
</head>

<body>

const unlockTime = new Date("2026-04-22T00:00:00+03:00");

const calendar = document.getElementById("calendar");
const messageBox = document.getElementById("messageBox");

// CREATE DAY BOXES
messages.forEach((msg, i) => {
  const box = document.createElement("div");
  box.className = "box";
  box.innerText = i + 1;
  calendar.appendChild(box);

  box.onclick = () => {
    if (i === 21 && new Date() < unlockTime) {
      let diff = unlockTime - new Date();

      const days = Math.floor(diff / (1000*60*60*24));
      diff -= days * (1000*60*60*24);

      const hours = Math.floor(diff / (1000*60*60));
      diff -= hours * (1000*60*60);

      const minutes = Math.floor(diff / (1000*60));

      messageBox.innerText = `🔒 ${days}d ${hours}h ${minutes}m left`;
      return;
    }

    messageBox.innerText = msg;
  };
});
